spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update # ?????? ?? ? ???? DB ???? ???? ????? ??
    show-sql: true # JPA? ???? SQL? ??? ???

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri : http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}

# AWS S3 Settings
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:none}
      secret-key: ${AWS_SECRET_KEY:none}
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:none}
      path:
        location: ${AWS_S3_PATH:none}

#Swagger
springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method

#JWT
jwt:
  secret: ${JWT_SECRET}
  access-exp-ms: ${JWT_EXPIRATION:3600000}
  refresh-exp-ms: ${JWT_REFRESH_EXPIRATION:1209600000}